<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.
    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Ustaad — AI-powered exam preparation for FAST-NU, NUST-NET &amp; NTS. Solve past papers, get instant AI explanations in Urdu &amp; English.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Viewport -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ustaad</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // ── Service Worker Registration ──────────────────────────────────────────
    //
    // THE FIX: We append Date.now() as a query param to flutter_service_worker.js
    // This forces the browser to always fetch a fresh copy of the service worker
    // on every page load — it can never serve a stale cached version.
    //
    // Without this, after you deploy a new version, returning users' browsers
    // keep the old service worker and never see your changes.
    //
    // How the auto-update flow works:
    //   1. Browser fetches fresh flutter_service_worker.js?v=<timestamp>
    //   2. Flutter's SW detects the app files changed
    //   3. Installs new SW in background (updatefound fires)
    //   4. We post SKIP_WAITING → new SW activates immediately
    //   5. controllerchange fires → page reloads → user sees new version
    //   All automatic. User never needs to clear cache.

    if ('serviceWorker' in navigator) {

      // ✅ Must be outside the load listener — attaches on first visit too
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        window.location.reload();
      });

      // ✅ flutter-first-frame fires after Flutter renders its first frame
      // safer than 'load' for Flutter web apps
      window.addEventListener('flutter-first-frame', function () {

        // ✅ Date.now() — unique on every page load, forces fresh SW fetch
        var swUrl = 'flutter_service_worker.js?v=' + Date.now();

        navigator.serviceWorker.register(swUrl).then(function (registration) {

          registration.addEventListener('updatefound', function () {
            var newWorker = registration.installing;
            if (!newWorker) return; // null guard

            newWorker.addEventListener('statechange', function () {
              // New SW installed and old SW still in control → activate now
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                newWorker.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });

        }).catch(function (error) {
          console.error('[Ustaad] Service worker registration failed:', error);
        });

      });
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
