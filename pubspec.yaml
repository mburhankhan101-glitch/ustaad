name: ustaad
description: "Apna Ustaad — AI-powered exam prep for Pakistani students."
publish_to: 'none'

version: 1.1.0+3

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0

  flutter_riverpod: ^2.0.0

  go_router: ^14.0.0

  google_sign_in: ^6.0.0

  http: ^1.2.0

  google_fonts: ^6.0.0

  shared_preferences: ^2.2.2

  lottie: ^3.3.3

  url_launcher: ^6.3.2

  hive_flutter: ^1.1.0

  connectivity_plus: ^6.0.3

  flutter_svg: ^2.3.0

  cupertino_icons: ^1.0.8

  archive: ^4.0.0

  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# ── App Icon Config ────────────────────────────────────────────────────────
flutter_icons:
  android: true
  ios: false
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#5B54E8"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/ 
    - assets/reels/     # ← added this line

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
        - asset: assets/fonts/Poppins-SemiBold.ttf
        - asset: assets/fonts/Poppins-Bold.ttf